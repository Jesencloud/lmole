[tool.ruff]
# 指定代码目标版本
target-version = "py310"
line-length = 100

[tool.ruff.lint]
# 启用的规则集
# E: pycodestyle
# F: Pyflakes
# I: isort (自动整理导入顺序)
# UP: pyupgrade (升级旧语法)
# B: flake8-bugbear (发现潜在bug)
# SIM: flake8-simplify (简化代码)
# ISC: flake8-implicit-str-concat (捕获缺逗号导致的隐式字符串拼接)
select = ["E", "F", "I", "UP", "B", "SIM", "W", "ISC"]
ignore = ["E501"]

# 自动修复
fixable = ["ALL"]
unfixable = []

[tool.ruff.format]
# 使用双引号，类似于 Black
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
